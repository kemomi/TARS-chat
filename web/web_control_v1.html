<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TARS-chat 远程控制台</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #21252e;
    --accent: #00d4aa;
    --accent-2: #ff6b9d;
    --text: #e6e8eb;
    --muted: #8a8f99;
    --danger: #ff5252;
    --warn: #ffb74d;
    --ok: #4caf50;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0; padding: 20px;
    min-height: 100vh;
  }
  .header {
    max-width: 720px; margin: 0 auto 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    background: var(--panel); font-size: 13px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger);
    transition: background .3s;
  }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.warn { background: var(--warn); }

  .grid {
    max-width: 720px; margin: 0 auto;
    display: grid; gap: 16px;
    grid-template-columns: 1fr;
  }
  .card {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .card h3 {
    margin: 0 0 14px;
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .row { display: flex; flex-wrap: wrap; gap: 8px; }
  button {
    padding: 10px 18px;
    font-size: 14px; font-weight: 500;
    border: none; border-radius: 8px;
    background: var(--panel-2);
    color: var(--text);
    cursor: pointer;
    transition: transform .1s, background .2s;
  }
  button:hover { background: #2a2f3a; }
  button:active { transform: scale(0.96); }
  button.primary { background: var(--accent); color: #0f1115; }
  button.accent { background: var(--accent-2); color: white; }
  button.ghost { background: transparent; border: 1px solid #2a2f3a; }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
  }
  .emoji-btn {
    padding: 18px 8px;
    background: var(--panel-2);
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
    border: 2px solid transparent;
  }
  .emoji-btn:hover { background: #2a2f3a; transform: translateY(-2px); }
  .emoji-btn.active {
    border-color: var(--accent);
    background: rgba(0,212,170,0.1);
  }
  .emoji-btn .face { font-size: 28px; display: block; }
  .emoji-btn .label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* 摇杆 */
  .joystick-wrap { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .joystick {
    width: 200px; height: 200px;
    background: radial-gradient(circle at center, #232831 0%, #15181e 100%);
    border-radius: 50%;
    position: relative;
    touch-action: none;
    user-select: none;
    border: 2px solid #2a2f3a;
  }
  .joystick::before {
    content: ""; position: absolute;
    width: 4px; height: 4px; background: var(--muted);
    border-radius: 50%; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .knob {
    width: 60px; height: 60px;
    background: linear-gradient(145deg, var(--accent), #00a085);
    border-radius: 50%;
    position: absolute;
    top: 70px; left: 70px;
    cursor: grab;
    box-shadow: 0 4px 12px rgba(0,212,170,0.4);
    transition: transform 0.08s;
  }
  .knob:active { cursor: grabbing; }
  .angles {
    font-family: "SF Mono", Consolas, monospace;
    font-size: 13px;
    color: var(--muted);
    background: var(--panel-2);
    padding: 12px 16px;
    border-radius: 8px;
    min-width: 140px;
  }
  .angles div { margin: 4px 0; }
  .angles span { color: var(--accent); font-weight: 600; }

  /* 输入 */
  .speak-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1; padding: 12px 14px;
    background: var(--panel-2);
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    color: var(--text); font-size: 14px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .log {
    background: #0a0c10;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 12px;
    color: var(--muted);
    height: 120px; overflow-y: auto;
  }
  .log .ts { color: #4a5260; }
  .log .ok { color: var(--ok); }
  .log .err { color: var(--danger); }

  @media (max-width: 480px) {
    body { padding: 12px; }
    h1 { font-size: 18px; }
    .joystick { width: 160px; height: 160px; }
    .knob { width: 48px; height: 48px; top: 56px; left: 56px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 TARS-chat 控制台</h1>
  <div class="status-pill">
    <span class="dot" id="dot"></span>
    <span id="status-text">连接中...</span>
  </div>
</div>

<div class="grid">

  <!-- 表情 -->
  <div class="card">
    <h3>表情</h3>
    <div class="emoji-grid" id="emoji-grid">
      <!-- JS 动态填充 -->
    </div>
  </div>

  <!-- 摇杆 -->
  <div class="card">
    <h3>头部姿态 (Pan / Tilt)</h3>
    <div class="joystick-wrap">
      <div class="joystick" id="joystick">
        <div class="knob" id="knob"></div>
      </div>
      <div class="angles">
        <div>Pan: <span id="pan-val">90</span>°</div>
        <div>Tilt: <span id="tilt-val">90</span>°</div>
      </div>
    </div>
    <div class="row" style="margin-top:14px; justify-content:center;">
      <button onclick="api('servo',{action:'center'})">回中</button>
      <button onclick="api('servo',{action:'nod'})">点头</button>
      <button onclick="api('servo',{action:'shake'})">摇头</button>
    </div>
  </div>

  <!-- 语音 -->
  <div class="card">
    <h3>语音对话</h3>
    <div class="speak-row">
      <input id="speak-input" type="text" placeholder="输入要说的话, 回车发送" />
      <button class="primary" onclick="doSpeak()">发送</button>
    </div>
  </div>

  <!-- 日志 -->
  <div class="card">
    <h3>事件日志</h3>
    <div class="log" id="log"></div>
  </div>

</div>

<!-- Socket.IO 客户端 (CDN) -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  // ============= 全局 =============
  const EMOTIONS = [
    {key: "neutral",   icon: "😐", label: "中性"},
    {key: "happy",     icon: "😊", label: "开心"},
    {key: "sad",       icon: "😢", label: "难过"},
    {key: "angry",     icon: "😠", label: "生气"},
    {key: "surprised", icon: "😲", label: "惊讶"},
    {key: "sleepy",    icon: "😴", label: "困倦"},
  ];

  const $ = (id) => document.getElementById(id);
  const log = (msg, cls="") => {
    const div = $("log");
    const ts = new Date().toLocaleTimeString();
    div.innerHTML += `<div><span class="ts">[${ts}]</span> <span class="${cls}">${msg}</span></div>`;
    div.scrollTop = div.scrollHeight;
  };

  // ============= Socket.IO =============
  const socket = io({ transports: ["websocket", "polling"] });
  socket.on("connect", () => {
    $("dot").className = "dot ok";
    $("status-text").textContent = "已连接";
    log("WebSocket 已连接", "ok");
    refreshStatus();
  });
  socket.on("disconnect", () => {
    $("dot").className = "dot";
    $("status-text").textContent = "已断开";
    log("WebSocket 断开", "err");
  });
  socket.on("face_changed", (d) => {
    setActiveEmoji(d.expression);
  });

  // ============= HTTP =============
  async function api(endpoint, body) {
    try {
      const r = await fetch(`/api/${endpoint}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body || {}),
      });
      const data = await r.json();
      if (!data.ok) log(`API ${endpoint} 失败: ${data.error || ""}`, "err");
      return data;
    } catch (e) {
      log(`API ${endpoint} 错误: ${e.message}`, "err");
    }
  }

  async function refreshStatus() {
    try {
      const r = await fetch("/api/status");
      const s = await r.json();
      if (s.servo) {
        $("pan-val").textContent = Math.round(s.servo.pan);
        $("tilt-val").textContent = Math.round(s.servo.tilt);
      }
      if (s.face) setActiveEmoji(s.face.current);
    } catch(e) { /* ignore */ }
  }

  // ============= 表情 =============
  function renderEmotions() {
    const g = $("emoji-grid");
    g.innerHTML = "";
    EMOTIONS.forEach(e => {
      const div = document.createElement("div");
      div.className = "emoji-btn";
      div.dataset.key = e.key;
      div.innerHTML = `<span class="face">${e.icon}</span><span class="label">${e.label}</span>`;
      div.onclick = () => {
        api("face", {expression: e.key});
        setActiveEmoji(e.key);
        log(`表情: ${e.label}`);
      };
      g.appendChild(div);
    });
  }
  function setActiveEmoji(key) {
    document.querySelectorAll(".emoji-btn").forEach(el => {
      el.classList.toggle("active", el.dataset.key === key);
    });
  }
  renderEmotions();

  // ============= 摇杆 =============
  const joy = $("joystick"), knob = $("knob");
  const RADIUS = 70;            // 移动半径 (像素)
  let dragging = false;
  let lastSent = 0;

  function setKnob(dx, dy) {
    const dist = Math.hypot(dx, dy);
    if (dist > RADIUS) {
      dx = dx / dist * RADIUS;
      dy = dy / dist * RADIUS;
    }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
    // dx, dy: -70 ~ 70 -> 0 ~ 180
    const pan  = Math.round(90 + (dx / RADIUS) * 90);
    const tilt = Math.round(90 + (dy / RADIUS) * 90);
    $("pan-val").textContent = pan;
    $("tilt-val").textContent = tilt;
    // 节流: 50ms 一次, 走 WebSocket
    const now = Date.now();
    if (now - lastSent > 50) {
      socket.emit("servo_stream", {pan, tilt});
      lastSent = now;
    }
  }

  function getPos(e) {
    const rect = joy.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: cx - rect.left - rect.width / 2,
      y: cy - rect.top - rect.height / 2,
    };
  }

  function startDrag(e) {
    dragging = true;
    e.preventDefault();
  }
  function moveDrag(e) {
    if (!dragging) return;
    const p = getPos(e);
    setKnob(p.x, p.y);
    e.preventDefault();
  }
  function endDrag() {
    if (!dragging) return;
    dragging = false;
    knob.style.transform = "translate(0,0)";
    socket.emit("servo_stream", {pan: 90, tilt: 90});
    $("pan-val").textContent = 90;
    $("tilt-val").textContent = 90;
  }

  joy.addEventListener("mousedown", startDrag);
  joy.addEventListener("touchstart", startDrag, {passive: false});
  document.addEventListener("mousemove", moveDrag);
  document.addEventListener("touchmove", moveDrag, {passive: false});
  document.addEventListener("mouseup", endDrag);
  document.addEventListener("touchend", endDrag);

  // ============= 语音 =============
  function doSpeak() {
    const t = $("speak-input").value.trim();
    if (!t) return;
    api("speak", {text: t});
    log(`说话: "${t}"`);
    $("speak-input").value = "";
  }
  $("speak-input").addEventListener("keypress", e => {
    if (e.key === "Enter") doSpeak();
  });

  // 定时刷新状态
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>
