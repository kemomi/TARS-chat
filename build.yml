name: Build TARS-chat Firmware

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libs (SDL for pygame)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libportaudio2

      - name: Install dependencies
        working-directory: firmware
        run: |
          python -m pip install --upgrade pip
          # 排除 pigpio/RPi.GPIO 等树莓派专属包
          grep -v -E "pigpio|RPi.GPIO" requirements.txt > req-ci.txt
          pip install -r req-ci.txt
          pip install ruff

      - name: Lint
        working-directory: firmware
        run: ruff check src/ main.py || true

      - name: Import smoke test
        working-directory: firmware
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          python -c "from src.servo_controller import ServoController; print('servo OK')"
          python -c "from src.web_server import create_app; print('web OK')"